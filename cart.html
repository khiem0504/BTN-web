<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - Elite Football Kit</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="css/shared.css">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        .total-box { margin-top: 30px; text-align: right; padding: 20px; background: #f9f9f9; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container" style="padding: 60px 0;">
        <h1>Giỏ Hàng Của Bạn</h1>
        <div id="cart-content">
            <table>
                <thead>
                    <tr>
                        <th>Sản phẩm</th>
                        <th>Số lượng</th>
                        <th>Đơn giá</th>
                        <th>Thành tiền</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="cart-items">
                    </tbody>
            </table>
            
            <div class="total-box">
                <h3>Tổng cộng: <span id="total-price" style="color: #d9534f;">0đ</span></h3>
                <button class="btn" onclick="toCheckout()" style="margin-top: 20px; padding: 15px 40px;">TIẾN HÀNH THANH TOÁN</button>
            </div>
        </div>
    </div>
    <script src="js/shared.js"></script>
    <script>
        // Hiển thị sản phẩm từ localStorage
        function displayCart() {
            const itemsContainer = document.getElementById('cart-items');
            const totalElement = document.getElementById('total-price');
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            itemsContainer.innerHTML = '';
            let total = 0;
            cart.forEach((item, index) => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                itemsContainer.innerHTML += `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.qty}</td>
                        <td>${item.price.toLocaleString()}đ</td>
                        <td>${itemTotal.toLocaleString()}đ</td>
                        <td>
                            <button onclick="removeItem(${index})"
                             style="color:red; border:none; background:none; cursor:pointer;">
                                Xóa
                            </button>
                        </td>
                    </tr>
                `;
            });

            totalElement.innerText = total.toLocaleString() + 'đ';
        }
        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            displayCart();
            updateCartBadge();
        }
        function toCheckout() {
            window.location.href = 'checkout.html';
        }
        document.addEventListener('DOMContentLoaded', displayCart);
    </script>
</body>
</html>
