<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ - Elite Football Kit</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="css/shared.css">
</head>
<body>
    <div class="container" style="padding: 60px 0;">
        <h1 style="text-align: center; margin-bottom: 20px;">Kết Nối Với Chúng Tôi</h1>
        <p style="text-align: center; color: #666; margin-bottom: 50px;">Gửi thắc mắc của bạn, chúng tôi sẽ phản hồi trong vòng 24h.</p>
        
        <div style="max-width: 800px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
            <div>
                <h3>Thông tin liên hệ</h3>
                <p><strong>Địa chỉ:</strong> Số 1 Đại Cồ Việt, Hai Bà Trưng, Hà Nội</p>
                <p><strong>Hotline:</strong> 1900 1234</p>
                <p><strong>Email:</strong> support@elitekit.vn</p>
            </div>
            <form style="display: flex; flex-direction: column; gap: 15px;">
                <input type="text" placeholder="Họ và tên" style="padding: 12px; border: 1px solid #ddd; border-radius: 5px;">
                <input type="email" placeholder="Email" style="padding: 12px; border: 1px solid #ddd; border-radius: 5px;">
                <textarea placeholder="Nội dung lời nhắn" rows="5" style="padding: 12px; border: 1px solid #ddd; border-radius: 5px;"></textarea>
                <button type="submit" class="btn">Gửi lời nhắn</button>
            </form>
        </div>
    </div>

    <script src="js/shared.js"></script>
</body>
</html>s
