<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Elite Football Kit</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav>
    <div class="logo">
        <a href="home.html" style="display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit;">
            <img src="images/logo.png" alt="Elite Football Kit Logo" style="height: 50px; width: auto; object-fit: contain;">
            <span style="font-weight: 700; font-size: 1.2rem; letter-spacing: 0.5px;">ELITE FOOTBALL KIT</span>
        </a>
    </div>
    <div class="nav-links" id="navLinks">
        <a href="home.html">Trang chủ</a>
        <a href="about.html">Về chúng tôi</a>
        <a href="kits.html">Bộ sưu tập áo đấu</a> 
        <a href="news.html">Tin thể thao</a>
        <a href="contact.html">Liên hệ</a>
        <a href="login.html" class="active">Đăng nhập</a> <a href="cart.html">Giỏ hàng <span id="cart-badge"></span></a>
    </div>
    <div class="hamburger" onclick="toggleMenu()">☰</div>
</nav>
    </header>
    <div class="container" style="padding: 100px 0; display: flex; justify-content: center;">
        <div style="width: 100%; max-width: 400px; padding: 40px; border: 1px solid #eee; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
            <h2 style="text-align: center; margin-bottom: 30px;">ĐĂNG NHẬP</h2>
            <form style="display: flex; flex-direction: column; gap: 20px;">
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">Email</label>
                    <input type="email" placeholder="example@gmail.com" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">Mật khẩu</label>
                    <input id="password" type="password" placeholder="********" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="showPassword">
                    <label for="showPassword" style="font-size: 0.9rem;">Hiển thị mật khẩu</label>
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <a href="forgot-password.html" style="color: #007bff;">Quên mật khẩu?</a>
                </div>
                <button type="submit" class="btn" style="width: 100%; padding: 15px;">ĐĂNG NHẬP</button>
                <p style="text-align: center; font-size: 0.9rem;">Chưa có tài khoản? <a href="register.html" style="color: #007bff;">Đăng ký ngay</a></p>
            </form>
        </div>
    </div>
    <script>
        // Toggle hiển thị mật khẩu
        const checkbox = document.getElementById("showPassword");
        const password = document.getElementById("password");

        checkbox.addEventListener("change", () => {
            password.type = checkbox.checked ? "text" : "password";
        });
    </script>
    <script src="js/shared.js"></script>
</body>
<footer>
    <div class="footer-container" style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 40px; padding: 60px 5%; background: #fff; border-top: 1px solid #eee;">
        </div>
    <div class="copyright" style="text-align: center; padding: 25px; background: #fcfcfc; border-top: 1px solid #eee;">
        <p style="color: #888; font-size: 0.85rem;">© 2026 Elite Football Kit. Chuyên cung cấp áo đấu</p>
    </div>
</footer>
</html>
