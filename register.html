<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Elite Football Kit</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="css/shared.css">
</head>
<body>
    <nav>
        <div class="nav-links" id="navLinks">

            <a href="login.html" class="active">Đăng nhập</a>
    </nav>
    <div class="container" style="padding: 100px 0; display: flex; justify-content: center;">
        <div style="width: 100%; max-width: 400px; padding: 40px; border: 1px solid #eee; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
            <h2 style="text-align: center; margin-bottom: 30px;">ĐĂNG KÝ</h2>
            <form style="display: flex; flex-direction: column; gap: 20px;">
                <!-- Email -->
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">Email</label>
                    <input type="email" placeholder="example@gmail.com" required 
                           style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                <!-- Mật khẩu -->
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">Mật khẩu</label>
                    <input id="password" type="password" placeholder="********" required 
                           style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                <!-- Xác nhận mật khẩu -->
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">Xác nhận mật khẩu</label>
                    <input id="confirmPassword" type="password" placeholder="********" required 
                           style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
                </div>
                <!-- Hiển thị mật khẩu -->
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="showPassword">
                    <label for="showPassword" style="font-size: 0.9rem;">Hiển thị mật khẩu</label>
                </div>
                <!-- Đồng ý điều khoản -->
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="agreeTerms" required>
                    <label for="agreeTerms" style="font-size: 0.9rem;">
                        Tôi đồng ý với <a href="terms.html" style="color: #007bff;">điều khoản sử dụng</a>
                    </label>
                </div>
                <!-- Button -->
                <button type="submit" class="btn" style="width: 100%; padding: 15px;">
                    ĐĂNG KÝ
                </button>
                <!-- Footer -->
                <p style="text-align: center; font-size: 0.9rem;">
                    Đã có tài khoản? 
                    <a href="login.html" class="link" style="color: #007bff;">Đăng nhập ngay</a>
                </p>
            </form>
        </div>
    </div>
    <script>
        // Toggle hiển thị mật khẩu
        const checkbox = document.getElementById("showPassword");
        const password = document.getElementById("password");
        const confirmPassword = document.getElementById("confirmPassword");

        checkbox.addEventListener("change", () => {
            const type = checkbox.checked ? "text" : "password";
            password.type = type;
            confirmPassword.type = type;
        });
    </script>
    <script src="js/shared.js"></script>
</body>
</html>
