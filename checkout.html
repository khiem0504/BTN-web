<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - Elite Football Kit</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="css/shared.css">
</head>
<body>
    <div class="container" style="padding: 60px 0;">
        <h1 style="margin-bottom: 40px;">Thông tin thanh toán</h1>
        <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 40px;">
            <div style="background: #f9f9f9; padding: 30px; border-radius: 12px;">
                <h3 style="margin-bottom: 20px;">1. Địa chỉ nhận hàng</h3>
                <form style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <input type="text" placeholder="Họ và tên" required style="grid-column: span 2; padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
                    <input type="email" placeholder="Email" required style="padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
                    <input type="tel" placeholder="Số điện thoại" required style="padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
                    <input type="text" placeholder="Địa chỉ chi tiết" required style="grid-column: span 2; padding: 12px; border: 1px solid #ddd; border-radius: 6px;">
                </form>
            </div>

            <div style="border: 1px solid #eee; padding: 30px; border-radius: 12px;">
                <h3 style="margin-bottom: 20px;">2. Đơn hàng của bạn</h3>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
                <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 1.2rem;">
                    <span>Tổng tiền:</span>
                    <span id="checkout-total" style="color: #d9534f;">0đ</span>
                </div>
                <button class="btn" style="width: 100%; margin-top: 30px; padding: 15px;" onclick="showQR()">XÁC NHẬN ĐẶT HÀNG</button>
            </div>
        </div>
    </div>
    <div id="qr-modal" style=" display:none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:999;">
    <div style="background:#fff; padding:30px; border-radius:12px; text-align:center; max-width:300px; width:90%;">
        <h3>Quét mã để thanh toán</h3>
        <img src="images/qr-demo.png" alt="QR" style="width:200px; margin:20px 0;">
        <button class="btn btn-outline" onclick="closeQR()">Đóng</button>
    </div>
</div>
    <script>
    function loadTotal() {
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        const totalEl = document.getElementById("checkout-total");
        let total = 0;
        cart.forEach(item => {
            total += item.price;
        });
        totalEl.innerText = total.toLocaleString() + "đ";
    }
    document.addEventListener("DOMContentLoaded", loadTotal);
    </script>
    <script>
        function showQR() {
            const cart = JSON.parse(localStorage.getItem("cart")) || [];
            if(cart.length === 0) {
                alert("Giỏ hàng của bạn đang trống!");
                return;
            }
            document.getElementById('qr-modal').style.display = 'flex';
        }
        function closeQR() {
            document.getElementById('qr-modal').style.display = 'none';
        }
    </script>
</body>
</html>
